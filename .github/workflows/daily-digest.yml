name: Daily Digest

# Target delivery: 10:00 IST, sharp. The trigger fires a few minutes BEFORE
# 10:00; the pipeline builds the whole digest, then holds (DIGEST_POST_AT, see
# the run step) until exactly 10:00 IST to post — so delivery time doesn't
# depend on how long the build took.
#
# Two triggers, both aimed at ~09:50 IST:
#   1. repository_dispatch (event_type: daily-digest) — fired by an external
#      pinger (cron-job.org / EasyCron) at 09:50 IST. This is the punctual path.
#   2. schedule cron — fallback safety net at 04:20 UTC (09:50 IST). GitHub's
#      native cron slips (often late); when it fires before 10:00 the in-job
#      hold still lands it at 10:00, and when it slips past 10:00 it posts
#      immediately. (Scheduled workflows are also auto-disabled on inactive repos.)
#
# Safe to fire both: the concurrency group serializes overlapping runs, and the
# pipeline's idempotency guard skips posting if today's digest already went out.
#
# See docs/scheduling.md for the external pinger setup.
on:
  repository_dispatch:
    types: [daily-digest]
  schedule:
    - cron: '20 4 * * *'   # 04:20 UTC = 09:50 IST (then hold in-job until 10:00)
  workflow_dispatch:
    inputs:
      force:
        description: "Re-post even if today's digest already went out"
        type: boolean
        default: false

permissions:
  # write so the feedback step can commit the regenerated proposals/pending.json
  contents: write

# Prevent overlap between scheduled run, external dispatch, and manual trigger.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Headroom for the build (~3-5 min) plus the in-job hold until 10:00 IST
    # (up to ~10 min when fired at 09:50) plus the feedback steps.
    timeout-minutes: 30

    # The feedback loop (pull reactions → regenerate suggestions → commit) only
    # runs when a Blob token is configured. Until then these steps are skipped
    # and the digest behaves exactly as before. (secrets can't be read directly
    # in `if:`, so we surface a boolean via env.)
    env:
      FEEDBACK_ENABLED: ${{ secrets.BLOB_READ_WRITE_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore SQLite + Chroma from the previous run. On first ever run the
      # cache will miss and the pipeline will initialise both from scratch
      # (storage.init_db + reindex_content_dir over the committed inputs/content/).
      - name: Restore state cache
        id: state-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/db
            data/vector_store
          key: signal-agent-state-${{ github.run_id }}
          restore-keys: |
            signal-agent-state-

      - name: Run daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Bot token + channel id make the digest post via chat.postMessage,
          # which returns a message ts. Without the ts, Slack reactions can't be
          # linked back to a digest and the feedback loop can't score anything.
          # Both fall back to the webhook path when unset.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_LABEL: ${{ vars.SLACK_CHANNEL_LABEL }}
          # Build now, then hold until exactly 10:00 IST to post.
          DIGEST_POST_AT: "10:00"
        run: python src/main.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      # --- Feedback loop (only when BLOB_READ_WRITE_TOKEN is configured) -------

      - name: Pull Slack reactions into SQLite
        if: ${{ always() && env.FEEDBACK_ENABLED == 'true' }}
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: python src/feedback_puller.py

      - name: Regenerate tuning suggestions
        if: ${{ always() && env.FEEDBACK_ENABLED == 'true' }}
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/feedback_aggregator.py

      # Save even on failure so a partially-indexed Chroma store or a
      # half-written SQLite row doesn't get thrown away.
      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/db
            data/vector_store
          key: signal-agent-state-${{ github.run_id }}

      # Commit the regenerated suggestions so the admin UI (which reads
      # proposals/pending.json from GitHub) sees them. Authored as the Vercel
      # project owner so the resulting admin redeploy isn't blocked on Hobby.
      # Pushes made with GITHUB_TOKEN don't re-trigger workflows, so no loop.
      - name: Commit regenerated suggestions
        if: ${{ always() && env.FEEDBACK_ENABLED == 'true' }}
        continue-on-error: true
        run: |
          git config user.name "Signal Agent Bot"
          git config user.email "ashwinknan@gmail.com"
          git add proposals/pending.json proposals/history || true
          if git diff --cached --quiet; then
            echo "No suggestion changes to commit."
          else
            git commit -m "feedback: regenerate suggestions [skip ci]"
            git push
          fi

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: data/logs/
          retention-days: 14
          if-no-files-found: ignore
