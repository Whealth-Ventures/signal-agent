name: Daily Digest

# Target delivery: 08:00 IST, sharp. The trigger fires a few minutes BEFORE
# 08:00; the pipeline builds the whole digest, then holds (DIGEST_POST_AT, see
# the run step) until exactly 08:00 IST to post — so delivery time doesn't
# depend on how long the build took.
#
# Two triggers, both aimed at ~07:50 IST:
#   1. repository_dispatch (event_type: daily-digest) — fired by an external
#      pinger (cron-job.org / EasyCron) at 07:50 IST. This is the punctual path.
#   2. schedule cron — fallback safety net at 02:20 UTC (07:50 IST). GitHub's
#      native cron slips (often late); when it fires before 08:00 the in-job
#      hold still lands it at 08:00, and when it slips past 08:00 it posts
#      immediately. (Scheduled workflows are also auto-disabled on inactive repos.)
#
# Safe to fire both: the concurrency group serializes overlapping runs, and the
# pipeline's idempotency guard skips posting if today's digest already went out.
#
# See docs/scheduling.md for the external pinger setup.
on:
  repository_dispatch:
    types: [daily-digest]
  schedule:
    - cron: '20 2 * * *'   # 02:20 UTC = 07:50 IST (then hold in-job until 08:00)
  workflow_dispatch:
    inputs:
      test:
        description: "Test run — posts a [TEST]-marked digest immediately (no DB write, no dedup impact, ignores the 08:00 hold)"
        type: boolean
        default: false
      force:
        description: "Re-post even if today's digest already went out"
        type: boolean
        default: false

permissions:
  contents: read

# Prevent overlap between scheduled run, external dispatch, and manual trigger.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Headroom for the build (~3-5 min) plus the in-job hold until 08:00 IST
    # (up to ~10 min when fired at 07:50).
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore SQLite + Chroma from the previous run. On first ever run the
      # cache will miss and the pipeline will initialise both from scratch
      # (storage.init_db + reindex_content_dir over the committed inputs/content/).
      - name: Restore state cache
        id: state-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/db
            data/vector_store
          key: signal-agent-state-${{ github.run_id }}
          restore-keys: |
            signal-agent-state-

      - name: Run daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Bot token + channel id make the digest post via chat.postMessage;
          # both fall back to the webhook path when unset.
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_LABEL: ${{ vars.SLACK_CHANNEL_LABEL }}
          # Anthropic powers the single ranking call. Optional: if this secret
          # is unset, ranker.py automatically falls back to Perplexity.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Build now, then hold until exactly 08:00 IST to post.
          DIGEST_POST_AT: "08:00"
        run: python src/main.py ${{ (github.event_name == 'workflow_dispatch' && inputs.test) && '--test' || '' }} ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      # Save even on failure so a partially-indexed Chroma store or a
      # half-written SQLite row doesn't get thrown away.
      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/db
            data/vector_store
          key: signal-agent-state-${{ github.run_id }}

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: data/logs/
          retention-days: 14
          if-no-files-found: ignore
